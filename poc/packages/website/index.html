      <h1>CalcMD — Verifiable Tables for the AI Era</h1>
      <p>CalcMD is an open specification that extends markdown tables with embedded formulas, making AI-generated calculations transparent, checkable, and Git-friendly.</p>
      <p>Formulas use human-readable column names (like <code>Total=Qty*Price</code>) instead of cell references. They degrade gracefully in any standard markdown viewer and diff cleanly in Git.</p>
      <p>Supported features: arithmetic, comparisons, logical operators, aggregations (sum, avg, min, max, count), math functions (round, abs, floor, ceil), and conditionals (if).</p>
