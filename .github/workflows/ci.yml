name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint
      
      # WASM-specific tests
      - name: Test WASM package
        run: pnpm --filter @calcmd/wasm test:all
