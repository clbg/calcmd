<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Icon: minimal table bracket with = -->
  <g transform="translate(0, 4)">
    <!-- Left bracket -->
    <path d="M8 4 L2 4 Q0 4 0 6 L0 58 Q0 60 2 60 L8 60" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Right bracket -->
    <path d="M56 4 L62 4 Q64 4 64 6 L64 58 Q64 60 62 60 L56 60" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Horizontal divider -->
    <line x1="10" y1="32" x2="54" y2="32" stroke="url(#g)" stroke-width="2" stroke-opacity="0.4"/>
    <!-- Vertical divider -->
    <line x1="32" y1="10" x2="32" y2="54" stroke="url(#g)" stroke-width="2" stroke-opacity="0.4"/>
    <!-- Bold = sign, center -->
    <text x="32" y="30" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="30" font-weight="800" fill="#6366f1">=</text>
  </g>

  <!-- Wordmark -->
  <text x="80" y="50" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="800" letter-spacing="-2.5" fill="#94a3b8">Calc</text>
  <text x="192" y="50" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="800" letter-spacing="-2.5" fill="#6366f1">MD</text>
</svg>
